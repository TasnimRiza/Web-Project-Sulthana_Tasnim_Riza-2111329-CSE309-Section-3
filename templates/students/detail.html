{% extends "smms/base.html" %}
{% block content %}
<div class="card shadow-sm"><div class="card-body">
  <h1 class="h3">{{ student.name }}</h1>
  <p class="text-muted">{{ student.student_id }} · {{ student.school }}</p>
  <div class="row g-3">
    <div class="col-md-4"><div class="p-3 bg-light rounded">Attendance <strong>{{ student.attendance_percentage }}%</strong></div></div>
    <div class="col-md-4"><div class="p-3 bg-light rounded">GPA <strong>{{ student.average_gpa }}</strong></div></div>
    <div class="col-md-4"><div class="p-3 bg-light rounded">Guardian <strong>{{ student.guardian }}</strong></div></div>
  </div>
</div></div>
{% endblock %}
