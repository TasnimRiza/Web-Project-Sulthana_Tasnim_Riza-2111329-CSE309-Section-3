{% extends "smms/base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h3">Students</h1>
  <div class="d-flex gap-2"><a class="btn btn-primary" href="{% url 'students:create' %}">Register Student</a><a class="btn btn-outline-primary" href="{% url 'students:enrollment-create' %}">Enroll</a></div>
</div>
<form class="mb-3"><input class="form-control" name="q" value="{{ query }}" placeholder="Search by name, ID, or school"></form>
<div class="card shadow-sm"><div class="table-responsive"><table class="table mb-0">
  <thead><tr><th>ID</th><th>Name</th><th>School</th><th>Guardian</th><th></th></tr></thead>
  <tbody>{% for student in students %}<tr><td>{{ student.student_id }}</td><td>{{ student.name }}</td><td>{{ student.school }}</td><td>{{ student.guardian }}</td><td><a href="{% url 'students:detail' student.pk %}">View</a></td></tr>{% empty %}<tr><td colspan="5" class="p-4 text-muted">No students found.</td></tr>{% endfor %}</tbody>
</table></div></div>
{% endblock %}
