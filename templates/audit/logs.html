{% extends "smms/base.html" %}
{% block content %}
<h1 class="h3 mb-3">Audit Logs</h1>
<div class="card shadow-sm"><div class="table-responsive"><table class="table mb-0">
  <thead><tr><th>Time</th><th>User</th><th>Action</th><th>Record</th><th>Description</th></tr></thead>
  <tbody>{% for log in logs %}<tr><td>{{ log.created_at }}</td><td>{{ log.user }}</td><td>{{ log.action }}</td><td>{{ log.model_name }} #{{ log.object_id }}</td><td>{{ log.description }}</td></tr>{% empty %}<tr><td colspan="5" class="p-4 text-muted">No audit logs.</td></tr>{% endfor %}</tbody>
</table></div></div>
{% endblock %}
