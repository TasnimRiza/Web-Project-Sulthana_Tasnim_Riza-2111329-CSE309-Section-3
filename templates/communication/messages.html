{% extends "smms/base.html" %}
{% block content %}
<div class="d-flex justify-content-between mb-3"><h1 class="h3">Messages</h1><a class="btn btn-primary" href="{% url 'communication:message-create' %}">Send Message</a></div>
<div class="card shadow-sm"><table class="table mb-0"><tbody>{% for message in messages %}<tr><td>{{ message.sender }}</td><td><strong>{{ message.subject }}</strong><br>{{ message.body }}</td><td>{{ message.created_at }}</td></tr>{% empty %}<tr><td class="p-4 text-muted">No messages.</td></tr>{% endfor %}</tbody></table></div>
{% endblock %}
