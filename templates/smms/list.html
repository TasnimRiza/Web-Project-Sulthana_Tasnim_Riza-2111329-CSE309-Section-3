{% extends "smms/base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h3 mb-0">{{ title }}</h1>
  {% if create_url %}<a class="btn btn-primary" href="{% url create_url %}">Add New</a>{% endif %}
</div>
<div class="card shadow-sm">
  <div class="table-responsive">
    <table class="table table-hover align-middle mb-0">
      <thead><tr><th>Record</th><th>Status</th></tr></thead>
      <tbody>
        {% for object in objects %}
          <tr><td>{{ object }}</td><td><span class="badge text-bg-light">Active</span></td></tr>
        {% empty %}
          <tr><td colspan="2" class="text-muted p-4">No records yet.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
